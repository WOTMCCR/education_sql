name: education-data-qa

services:
  mysql:
    image: mysql:8.0
    container_name: education-data-qa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123321}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-edu}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ./volumes/mysql:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  elasticsearch:
    build: ./elasticsearch
    container_name: education-data-qa-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - ./volumes/elasticsearch:/usr/share/elasticsearch/data

  kibana:
    image: kibana:8.19.10
    container_name: education-data-qa-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      - elasticsearch

  qdrant:
    image: qdrant/qdrant:v1.16
    container_name: education-data-qa-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage

  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: education-data-qa-embedding
    restart: unless-stopped
    environment:
      MODEL_ID: ${EMBEDDING_MODEL_ID:-/models/bge-large-zh-v1.5}
      MAX_CONCURRENT_REQUESTS: ${EMBEDDING_MAX_CONCURRENT_REQUESTS:-4}
      MAX_BATCH_TOKENS: ${EMBEDDING_MAX_BATCH_TOKENS:-16384}
      TOKENIZATION_WORKERS: ${EMBEDDING_TOKENIZATION_WORKERS:-1}
    ports:
      - "${EMBEDDING_PORT:-8081}:80"
    volumes:
      - ${BGE_MODEL_DIR:-/home/ccr/local-docker/nl2sql-env/embedding/bge-large-zh-v1.5}:${EMBEDDING_MODEL_ID:-/models/bge-large-zh-v1.5}:ro
